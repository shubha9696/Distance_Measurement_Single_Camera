<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Vision | Advanced Distance Estimation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- MediaPipe Links -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">PRO-VISION</div>
            <div class="status-badge">
                <span class="dot"></span>
                <span id="status-text">SYSTEM READY</span>
            </div>
        </header>

        <main>
            <div class="video-wrapper">
                <video id="input-video" playsinline></video>
                <canvas id="output-canvas"></canvas>
                <div class="hud-overlay">
                    <div class="distance-readout">
                        <span class="label">ESTIMATED DISTANCE</span>
                        <div class="value"><span id="distance-val">--.-</span><span class="unit">CM</span></div>
                    </div>
                </div>
            </div>

            <aside class="controls">
                <div class="control-group">
                    <h3>CALIBRATION</h3>
                    <div class="input-field">
                        <label>Object Width (cm)</label>
                        <input type="number" id="known-width" value="14.3" step="0.1">
                    </div>
                    <div class="input-field">
                        <label>Current Distance (cm)</label>
                        <input type="number" id="known-dist" value="76.2" step="0.1">
                    </div>
                    <button id="calibrate-btn" class="primary-btn">CALIBRATE FOCAL LENGTH</button>
                </div>

                <div class="stats-group">
                    <h3>SYSTEM METRICS</h3>
                    <div class="stat-item">
                        <span>Focal Length</span>
                        <span id="focal-length-val">--</span>
                    </div>
                    <div class="stat-item">
                        <span>FPS</span>
                        <span id="fps-val">0</span>
                    </div>
                </div>
            </aside>
        </main>

        <footer>
            <p>Triangle Similarity Algorithm &bull; MediaPipe Face Mesh Engine</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
